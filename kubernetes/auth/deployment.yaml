apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: streamingapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: streamingapp-auth:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
          name: auth
        envFrom:
        - secretRef:
            name: streamingapp-secrets
        - configMapRef:
            name: streamingapp-configmap
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: streamingapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
      - name: admin
        image: streamingapp-admin:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        envFrom:
        - secretRef:
            name: streamingapp-secrets
        - configMapRef:
            name: streamingapp-configmap
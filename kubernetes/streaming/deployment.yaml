apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming
  namespace: streamingapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streaming
  template:
    metadata:
      labels:
        app: streaming
    spec:
      containers:
      - name: streaming
        image: streamingapp-streaming:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        envFrom:
        - secretRef:
            name: streamingapp-secrets
        - configMapRef:
            name: streamingapp-configmap
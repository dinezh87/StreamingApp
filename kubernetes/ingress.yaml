# Ingress for auth service — requires rewrite because auth mounts routes at /api
# but the frontend calls /api/auth/... so we strip the /auth segment
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamingapp-ingress-auth
  namespace: streamingapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"
spec:
  ingressClassName: nginx
  rules:
  - host: localhost
    http:
      paths:
      - path: /api/auth(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: auth-service
            port:
              number: 3001
---
# Ingress for all other services — no rewrite needed, internal paths already match
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: streamingapp-ingress
  namespace: streamingapp
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"
spec:
  ingressClassName: nginx
  rules:
  - host: localhost
    http:
      paths:
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: chat-service
            port:
              number: 3004
      - path: /api/admin
        pathType: Prefix
        backend:
          service:
            name: admin-service
            port:
              number: 3003
      - path: /api/streaming
        pathType: Prefix
        backend:
          service:
            name: streaming-service
            port:
              number: 3002
      - path: /api/chat
        pathType: Prefix
        backend:
          service:
            name: chat-service
            port:
              number: 3004
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

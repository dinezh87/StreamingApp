server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }

  location /api/auth/ {
    proxy_pass http://auth:3001/;
  }

  location /api/streaming/ {
    proxy_pass http://streaming:3002/;
  }

  location /api/admin/ {
    proxy_pass http://admin:3003/;
  }

  location /api/chat/ {
    proxy_pass http://chat:3004/;
  }
}